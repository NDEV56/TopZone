<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pembayaran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="payment-box">
            <h2>💳 Pembayaran</h2>
            <div class="promo-box" id="promoArea">
                <p>🎁 Voucher Pengguna Baru Tersedia!</p>
                <button onclick="pakaiVoucher()" id="btnVoucher">Pakai Voucher (-Rp 5.000)</button>
            </div>
            
            <h4>Metode Pembayaran:</h4>
            <select id="metodeBayar">
                <option value="qris">QRIS (Otomatis)</option>
                <option value="dana">DANA</option>
                <option value="gopay">GoPay</option>
                <option value="bank">Bank Jago (Manual)</option>
            </select>

            <textarea id="catatan" placeholder="Masukkan User ID / Catatan..."></textarea>
            <h3 id="finalTotal" style="margin:15px 0;">Total: Rp ---</h3>
            <button class="btn-login" style="width:100%" onclick="prosesBayar()">Bayar Sekarang (Midtrans)</button>
        </div>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
