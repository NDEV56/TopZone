<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Daftar</title>
     <link rel="stylesheet" href="tampilandaftar.css">
     <link script src="tampilandaftar.js"></script>
</head>
<body>
      <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
 
  <div class="card">
 
    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">✓</div>
      <div class="success-title">Pendaftaran Berhasil!</div>
      <div class="success-msg">Akun kamu telah berhasil dibuat.<br>Silakan login untuk mulai top up.</div>
      <button class="btn-to-login" onclick="window.location.href='login.html'">MASUK SEKARANG</button>
    </div>
 
    <!-- Logo -->
    <div class="logo-wrap">
      <img class="logo-img" src="logotopzone.png" alt="TopZone Logo"
           onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';"/>
      <div class="logo-fallback" id="logoFallback" style="display:none;">T</div>
      <div class="logo-text">TOPZONE</div>
      <div class="logo-sub">Buat Akun Baru</div>
    </div>
 
    <div class="field">
      <label for="nama">Nama Lengkap</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
        </svg>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap"/>
      </div>
      <div class="hint err" id="hintNama">Nama tidak boleh kosong</div>
    </div>
 
    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" id="username" placeholder="Minimal 4 karakter"/>
      </div>
      <div class="hint err" id="hintUsername">Username minimal 4 karakter</div>
    </div>
 
    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
        </svg>
        <input type="email" id="email" placeholder="contoh@email.com"/>
      </div>
      <div class="hint err" id="hintEmail">Format email tidak valid</div>
    </div>
 
    <div class="divider-row"><span>Keamanan Akun</span></div>
 
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Minimal 8 karakter" oninput="checkStrength(this.value)"/>
        <span class="toggle-pw" onclick="togglePw('password', this)">
          <svg id="eyePw" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
      <div class="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="hint err" id="hintPw">Password minimal 8 karakter</div>
    </div>
 
    <div class="field">
      <label for="konfirmasi">Konfirmasi Password</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
          <path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" id="konfirmasi" placeholder="Ulangi password"/>
        <span class="toggle-pw" onclick="togglePw('konfirmasi', this)">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
      <div class="hint err" id="hintKonfirmasi">Password tidak cocok</div>
    </div>
 
    <div class="btn-wrap">
      <button class="btn-daftar" onclick="submitForm()">DAFTAR</button>
    </div>
 
    <div class="footer-link">
      Sudah punya akun? <a href="tampilanlogin.html">Masuk di sini</a>
    </div>

</body>
</html>
