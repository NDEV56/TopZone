<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Daftar</title>
     <link rel="stylesheet" href="tampilandaftar.css">
     <link script src="tampilandaftar.js"></script>
</head>
<body>
     <div class="orb orb-1"></div>
     <div class="orb orb-2"></div>

     <div class="card">
          <div class="success-overlay" id="successOverlay">
          <div class="success-icon">✓</div>
          <div class="success-title">Pendaftaran Berhasil</div>
          <div class="success-message">Selamat datang di TopZone! Akun Anda telah berhasil dibuat.<br>Silahkan Login</div>
          <button class="success-btn" onclick="window.location.href='tampilanlogin.html'">Masuk Sekarang</button>
     </div>

     <div class="logo-wrap">
          <img class="logo-img" src="logotopzone.png" alt="TopZone Logo"/>
          <div class="logo-text">TOPZONE</div>
          <div class="logo-subtext">Daftar Akun Baru</div>
     </div>

     <div class="field">
          <label for="nama">Nama Lengkap</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8e4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
            <input type="text" id="nama" placeholder="Masukkan Nama Lengkap">
          </div>
          <div class="hint err" id="hintNama">Nama Lengkap Tidak Boleh Kosong</div>
     </div>

     <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8e4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
            <input type="text" id="username" placeholder="Masukkan Username">
          </div>
          <div class="hint err" id="hintUsername">Username Minimal 4 Karakter</div>
     </div>

     <div class="field">
          <lanel for="email">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/></svg>
            <input type="email" id="email" placeholder="Masukkan Email">
          </div>
          <div class="hint err" id="hintEmail">Format Email Tidak Valid</div>
     </div>

     <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" placeholder="Minimal 8 Karakter" oninput="checkStrength(this.value)"/>
            <span class="toggle-password" onclick="togglePw('password', this)">
               <svg id="eyePw" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <div class="stength-bar">
               <div class="strength-seg" id="s1"></div>
               <div class="strength-seg" id="s2"></div>
               <div class="strength-seg" id="s3"></div>
               <div class="strength-seg" id="s4"></div>
          </div>
          <div class="hint err" id="hintPassword">Password Minimal 8 Karakter</div>
     </div>

     <div class="field">
          <label for="konfirmasi">Konfirmasi Password</label>
          <div class="input-wrap">
             <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gold2)" stroke-width="2" stroke-linecap="round">
             <path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
             <input type="password" id="konfirmasi" placeholder="Ulangi password"/>
             <span class="toggle-pw" onclick="togglePw('konfirmasi', this)">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
             </span>
          </div>
          <div class="hint err" id="hintKonfirmasi">Password tidak cocok</div>
     </div>

     <div class="btn-wrap">
          <button class="btn-daftar" onclick="submitForm()">DAFTAR</button>
     </div>

     <div class="footer-link">
          Sudah punya akun? <a href="tampilanlogin.html">Masuk Di Sini</a>
     </div>

</body>
</html>
